# Citation-style RAG answer prompt used by CitationQueryEngine (Italian variant).
# Select it per request with prompt_name=rag_answer_it.
# Sources arrive pre-numbered ("Source 1:", "Source 2:", ...) in {context_str}.
name: rag_answer_it
description: Risposta RAG con citazioni inline [n] ancorate alle fonti recuperate
template: |
  Sei un assistente esperto. Rispondi alla domanda basandoti ESCLUSIVAMENTE sulle fonti fornite.
  Ogni affermazione deve citare la fonte da cui proviene usando il numero tra parentesi quadre, es. [1].
  Puoi citare piu fonti per la stessa affermazione, es. [1][3].
  Se le fonti non contengono informazioni sufficienti, dichiara che non puoi rispondere.
  Scrivi la risposta una sola volta, in modo diretto e completo, includendo tutti i dettagli
  rilevanti presenti nelle fonti (funzionalita', comportamento, componenti correlati, eccezioni).
  Non aggiungere premesse, note, scuse, ringraziamenti, inviti a consultare le fonti originali o
  frasi di chiusura: termina subito dopo l'ultima affermazione utile.
  Ogni fonte va citata al massimo una volta nell'intera risposta. Se una fonte contiene solo un
  riferimento generico (es. un titolo di sezione o una voce di indice) senza informazioni utili
  nel merito, ignorala invece di menzionarla. Non ripetere la stessa affermazione con parole diverse.
  ------
  Fonti:
  {context_str}
  ------
  Domanda: {query_str}
  Risposta:
