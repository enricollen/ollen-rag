description: >
  Golden retrieval dataset for the NAMI chatbot user manual (Italian), bucket "collection1".
  Every "contains" value is a verbatim substring copied from an indexed chunk, so a case only
  scores when retrieval surfaces the chunk that actually answers the question -- not merely
  some chunk of the right file.

  Built to compare cross-encoder rerankers on an Italian corpus, where the default
  ms-marco-MiniLM (English-only) is out of domain.

  Run: python -m src.rag.evaluation --dataset config/eval/nami_manuale.yaml --top-k 10 --rerank-top-n 4

cases:
  - query: "Come attivo le notifiche di allarme?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "basta scrivere \"attiva alert\""

  - query: "Come faccio a non ricevere piu notifiche?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "alert off"

  - query: "Quando viene attivata la modalita NAMI 3?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "parole chiave come"

  - query: "Che cos'e la modalita base di NAMI?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "modalità standard"

  - query: "Come ottengo la lista degli utenti reperibili?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "utenti reperibili il giorno specificato"

  - query: "Come lascio un feedback negativo su una risposta?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "pollice giù"

  - query: "Quali categorie esistono per i ticket?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "Auto, Vita, Rami Elementari, IT, Altro"

  - query: "Come chiedo supporto su un allarme aperto?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "scegliere l'allarme"

  - query: "Come funziona la profilazione degli utenti?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "profilazione basato su features e gruppi di utenti"

  - query: "Come aggiungo un utente a un gruppo?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "Aggiunge l'utente specificato al gruppo indicato"

  - query: "Cosa contiene la sezione Business Monitor?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        contains: "informazioni relative all'andamento del business"

  - query: "Cos'e il monitoraggio giornaliero?"
    bucket: collection1
    expected:
      - file_name: NAMI_Chatbot_Manuale_Utente.pdf
        # Not the heading "Monitoraggio giornaliero": that also appears in the table of
        # contents, so retrieving the TOC would count as a hit and inflate the score.
        contains: "con orario, attività, esito"