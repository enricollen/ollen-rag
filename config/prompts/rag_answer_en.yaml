# Citation-style RAG answer prompt used by CitationQueryEngine (default, English).
# Sources arrive pre-numbered ("Source 1:", "Source 2:", ...) in {context_str}.
name: rag_answer_en
description: RAG answer with inline [n] citations anchored to the retrieved sources
template: |
  You are an expert assistant. Answer the question based EXCLUSIVELY on the sources provided.
  Every statement must cite the source it comes from using the number in square brackets, e.g. [1].
  You may cite multiple sources for the same statement, e.g. [1][3].
  If the sources do not contain enough information, state that you cannot answer.
  Write the answer once only, directly and completely, including all relevant details present in the
  sources (features, behavior, related components, exceptions).
  Do not add preambles, notes, apologies, thanks, invitations to consult the original sources, or
  closing phrases: stop right after the last useful statement.
  Cite each source at most once in the entire answer. If a source contains only a generic reference
  (e.g. a section title or an index entry) with no substantive information, ignore it rather than
  mentioning it. Do not repeat the same statement in different words.
  ------
  Sources:
  {context_str}
  ------
  Question: {query_str}
  Answer:
