name: docker-publish

# Builds and publishes the CPU-flavored image to GHCR so `docker compose pull` works without a
# 15-20 minute local build (LibreOffice + torch + baked models + the Ollama pull). GPU users still
# build locally with `docker compose build --build-arg TORCH_FLAVOR=gpu` -- that flavor is not
# published here since the CUDA wheels roughly double image size and build time for a variant most
# CI runners can't even exercise (no GPU on the runner).
on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        # Only needed for arm64; skip the emulation setup on the fast branch-build path.
        if: startsWith(github.ref, 'refs/tags/v')

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # amd64 on every push (fast iteration); add arm64 (Apple Silicon, ARM servers) only for
      # tagged releases, where the extra QEMU-emulated build time is worth paying once.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          build-args: |
            TORCH_FLAVOR=cpu
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
