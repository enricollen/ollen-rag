# docker-compose.yml — turnkey local stack. `docker compose pull && docker compose up` = service +
# Ollama + on-disk Chroma, no API keys, no local build (pulls the published CPU image). Add
# OpenSearch with: `docker compose --profile opensearch up`.
services:
  ollen-rag:
    # Published CPU image (see .github/workflows/docker-publish.yml); `docker compose pull` fetches
    # it so `up` skips the ~15-20min local build. Pin a release instead of tracking latest with
    # OLLEN_RAG_IMAGE_TAG=v1.2.3 docker compose pull.
    image: ghcr.io/enricollen/ollen-rag:${OLLEN_RAG_IMAGE_TAG:-latest}
    # `build:` stays so `docker compose up --build` (needed for TORCH_FLAVOR=gpu, since only the
    # CPU flavor is published) still works without editing this file.
    build:
      context: .
      args:
        # cpu (default, ~5-6GB smaller) or gpu. Override: `TORCH_FLAVOR=gpu docker compose up --build`.
        TORCH_FLAVOR: ${TORCH_FLAVOR:-cpu}
    restart: unless-stopped          # crash recovery only -- config saves apply live, no reboot needed
    # For GPU inference: build with TORCH_FLAVOR=gpu and uncomment the reservation below (needs the
    # NVIDIA Container Toolkit on the host).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # No `environment:` block here on purpose: LLM/embedding provider default to "" (src/settings.py),
    # so /api/v1/onboarding/status reports not-configured and the wizard at /ui/ (or your own
    # OLLEN_RAG_LLM_PROVIDER / OLLEN_RAG_EMBEDDING_PROVIDER env vars, for headless deploys) is what
    # actually turns this stack on. Every other field lives in .env (seeded once below) instead of
    # here, so the Settings UI can freely change it afterwards -- see the `command:` comment.
    ports:
      - "8000:8000"
    volumes:
      - ollen-config:/app/config-store     # persists the wizard-written .env (see command)
      - ollen-chroma:/app/data/chroma      # persists indexed data
    # Keep the writable .env on the config volume, symlinked to where the app reads it. Seeds a
    # turnkey-friendly default (chroma, no external store to run) into that .env exactly once, on
    # a fresh volume -- as real .env content, not a fixed env var, so the Settings UI can freely
    # override it afterwards and have that change stick (a literal `environment:` entry here would
    # always outrank whatever gets written to .env, permanently pinning the vector store to chroma).
    command: >
      sh -c "mkdir -p /app/config-store &&
             [ -s /app/config-store/.env ] || printf '%s\n' 'OLLEN_RAG_VECTOR_STORE=chroma' 'OLLEN_RAG_CHROMA_PATH=/app/data/chroma' 'OLLEN_RAG_OLLAMA_API_BASE=http://ollama:11434' 'OLLEN_RAG_OLLAMA_MODEL=gemma3:270m' > /app/config-store/.env &&
             ln -sf /app/config-store/.env /app/.env &&
             exec uvicorn app:app --host 0.0.0.0 --port 8000"
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama        # persists pulled models
    # Pull a tiny CPU-friendly default model on first start, then keep serving.
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull gemma3:270m; wait"

  opensearch:
    image: opensearchproject/opensearch:3.2.0
    profiles: ["opensearch"]
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.2.0
    profiles: ["opensearch"]
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

volumes:
  ollen-config:
  ollen-chroma:
  ollama-models:
  opensearch-data:
